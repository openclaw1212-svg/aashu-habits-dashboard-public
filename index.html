<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project Habit — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{background:#f3f4f6}
    .card{background:white;border-radius:10px;padding:14px;box-shadow:0 6px 18px rgba(15,23,42,0.06)}
    .chat-card{background:linear-gradient(90deg,#fbf8ff,#f7fff9);border-left:4px solid #7c3aed}
  </style>
</head>
<body class="p-6 font-sans text-gray-800">
  <header class="mb-6">
    <h1 class="text-2xl font-semibold">Project Habit — Premium Dashboard</h1>
    <p class="text-sm text-gray-600">Chat-style progress, sparklines, calendar heatmap (demo)</p>
  </header>

  <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <section class="md:col-span-2">
      <div id="summary" class="card mb-4">Loading summary…</div>

      <div class="card mb-4">
        <h2 class="font-medium mb-2">30-day trends</h2>
        <canvas id="trendChart" height="120"></canvas>
      </div>

      <div class="card">
        <h2 class="font-medium mb-2">Chat-style progress feed</h2>
        <div id="feed" class="space-y-3"></div>
      </div>
    </section>

    <aside>
      <div class="card mb-4">
        <h3 class="font-medium">Recent snapshot</h3>
        <div id="recent" class="mt-2 text-sm text-gray-700"></div>
      </div>

      <div class="card">
        <h3 class="font-medium">Settings</h3>
        <div class="mt-2 text-sm text-gray-600">Data format: per-day JSON. Deploy-ready for Netlify.</div>
      </div>
    </aside>
  </main>

  <script>
    async function fetchDays(){
      const list = ['2026-03-04','2026-03-03'];
      const days = [];
      for(const d of list){
        try{ const r = await fetch('data/habits/'+d+'.json'); if(r.ok) days.push(await r.json()); }catch(e){}
      }
      return days;
    }

    function buildHabitSeries(days){
      const map = {};
      days.forEach(day=> day.entries.forEach(e=>{
        if(!map[e.habit]) map[e.habit]=[];
        map[e.habit].push({date:day.date,value:e.value,ts:e.ts,note:e.note});
      }));
      return map;
    }

    function renderSummary(map){
      const el = document.getElementById('summary');
      el.innerHTML='';
      for(const h in map){
        const arr = map[h];
        const last = arr[0] || {};
        const recent = arr.slice(0,3).map(x=>x.value).join(', ');
        const card = document.createElement('div'); card.className='flex items-center justify-between mb-3';
        card.innerHTML = `<div><div class="text-sm text-gray-500">${h}</div><div class="text-lg font-semibold">${last.value ?? '-'} <span class="text-sm text-gray-400">today</span></div><div class="text-xs text-gray-500">last: ${recent}</div></div><div class="text-sm text-green-600">Streak: ${computeStreak(arr)}</div>`;
        el.appendChild(card);
      }
    }

    function computeStreak(arr){
      let streak=0;
      for(const a of arr){ if(a.value && a.value !== 0) streak++; else break; }
      return streak;
    }

    function renderFeed(map){
      const feed = document.getElementById('feed'); feed.innerHTML='';
      for(const h in map){
        const arr = map[h];
        const card = document.createElement('div'); card.className='card chat-card';
        const last3 = arr.slice(0,3).map(x=>x.value+'').join(' · ');
        card.innerHTML = `<div class="flex justify-between"><strong>${h}</strong><div class="text-sm text-gray-600">Last 3: ${last3}</div></div><div class="mt-2 text-sm text-gray-700">${generateNarrative(h,arr)}</div>`;
        feed.appendChild(card);
      }
    }

    function generateNarrative(habit,arr){
      const lines = arr.map((x,i)=>{
        const label = i===0 ? 'today' : (i+'d ago');
        return `${label}: ${x.value}${typeof x.value==='number'? '': ''} ${x.note? `(${x.note})`:''}`;
      }).join(' · ');
      const streak = computeStreak(arr);
      const avg = (arr.slice(0,7).reduce((s,a)=>s+(Number(a.value)||0),0)/Math.min(7,arr.length)).toFixed(2);
      return `${lines}. Streak: ${streak}. 7-day avg: ${avg}`;
    }

    function renderTrendChart(map){
      const ctx = document.getElementById('trendChart').getContext('2d');
      const labels = [];
      const datasets = [];
      // collect up to 7 days from sample
      const days = ['2026-03-04','2026-03-03'];
      days.forEach(d=>labels.push(d));
      let colorIdx=0; const colors=['#6366f1','#ef4444','#10b981','#f59e0b'];
      for(const h in map){
        const series = map[h].map(x=>Number(x.value)||0);
        datasets.push({label:h,data:series,fill:false,borderColor:colors[colorIdx%colors.length],tension:0.3});
        colorIdx++;
      }
      new Chart(ctx,{type:'line',data:{labels, datasets},options:{plugins:{legend:{display:true}},scales:{y:{beginAtZero:true}}}});
    }

    (async function(){
      const days = await fetchDays();
      const map = buildHabitSeries(days);
      renderSummary(map);
      renderFeed(map);
      renderTrendChart(map);
      document.getElementById('recent').textContent = JSON.stringify(days[0]||{}, null, 2);
    })();
  </script>
</body>
</html>
